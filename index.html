<!doctype html>
<html class="dark" data-theme="dark" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroTrade</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#111417",
              surface: "#111417",
              "surface-container-lowest": "#0b0e11",
              "surface-container-low": "#191c1f",
              "surface-container": "#1d2023",
              "surface-container-high": "#272a2e",
              "surface-container-highest": "#323538",
              "surface-bright": "#37393d",
              "surface-variant": "#323538",
              "on-surface": "#e1e2e7",
              "on-surface-variant": "#c1c6d7",
              outline: "#8b90a0",
              "outline-variant": "#414754",
              primary: "#adc7ff",
              "primary-container": "#4a8eff",
              "on-primary-container": "#f8fbff",
              secondary: "#44e092",
              "secondary-container": "#03c177",
              "on-secondary-container": "#004729",
              tertiary: "#ffb4aa",
              "tertiary-container": "#ff5545",
              "on-tertiary-container": "#5c0002",
              error: "#ffb4ab",
              "error-container": "#93000a",
              "on-error-container": "#ffdad6",
              "primary-fixed": "#d8e2ff",
              "secondary-fixed": "#66fdac",
              "tertiary-fixed": "#ffdad5"
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem"
            },
            spacing: {
              unit: "4px",
              "container-margin": "16px",
              gutter: "8px",
              "widget-padding": "12px",
              "table-cell-padding": "8px 12px"
            },
            fontFamily: {
              "body-md": ["Inter"],
              display: ["Inter"],
              "title-sm": ["Inter"],
              "label-caps": ["Inter"],
              "headline-lg": ["Inter"],
              "body-lg": ["Inter"],
              "headline-md": ["Inter"],
              "body-sm": ["Inter"],
              "label-mono": ["JetBrains Mono"]
            },
            fontSize: {
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              display: ["36px", { lineHeight: "44px", letterSpacing: "0", fontWeight: "700" }],
              "title-sm": ["16px", { lineHeight: "24px", fontWeight: "600" }],
              "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0", fontWeight: "700" }],
              "headline-lg": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "body-lg": ["17px", { lineHeight: "26px", fontWeight: "400" }],
              "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-mono": ["14px", { lineHeight: "20px", letterSpacing: "0", fontWeight: "500" }]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
